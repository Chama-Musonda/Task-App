<!DOCTYPE html>

<html className="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | TaskFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#0b0f10",
                    "inverse-primary": "#8582ff",
                    "tertiary": "#575e78",
                    "tertiary-fixed": "#d2d9f8",
                    "secondary-dim": "#545256",
                    "on-primary-fixed": "#2a13c5",
                    "surface": "#f7f9fb",
                    "primary-container": "#e2dfff",
                    "tertiary-dim": "#4b526c",
                    "on-secondary-container": "#525155",
                    "tertiary-fixed-dim": "#c4cbe9",
                    "outline": "#717c82",
                    "on-tertiary-fixed-variant": "#4e556f",
                    "error-container": "#ff8b9a",
                    "outline-variant": "#a9b4b9",
                    "on-tertiary": "#faf8ff",
                    "on-error": "#fff7f7",
                    "on-background": "#2a3439",
                    "surface-variant": "#d9e4ea",
                    "on-primary-container": "#3f33d6",
                    "tertiary-container": "#d2d9f8",
                    "secondary-fixed-dim": "#d7d3d8",
                    "primary-dim": "#4034d7",
                    "surface-container-low": "#f0f4f7",
                    "inverse-on-surface": "#9a9d9f",
                    "surface-container": "#e8eff3",
                    "secondary": "#605e62",
                    "primary-fixed-dim": "#d2d0ff",
                    "on-error-container": "#782232",
                    "surface-container-lowest": "#ffffff",
                    "error-dim": "#4f0116",
                    "on-secondary-fixed-variant": "#5c5b5f",
                    "secondary-fixed": "#e5e1e6",
                    "secondary-container": "#e5e1e6",
                    "on-primary-fixed-variant": "#4a40e0",
                    "error": "#9e3f4e",
                    "background": "#f7f9fb",
                    "primary-fixed": "#e2dfff",
                    "on-tertiary-fixed": "#323951",
                    "surface-container-high": "#e1e9ee",
                    "surface-tint": "#4d44e3",
                    "primary": "#4d44e3",
                    "on-secondary": "#fcf8fc",
                    "surface-dim": "#cfdce3",
                    "surface-bright": "#f7f9fb",
                    "on-surface-variant": "#566166",
                    "on-secondary-fixed": "#403f43",
                    "on-primary": "#faf6ff",
                    "on-tertiary-container": "#444c65",
                    "on-surface": "#2a3439",
                    "surface-container-highest": "#d9e4ea"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ghost-shadow {
            box-shadow: 0px 12px 32px rgba(42, 52, 57, 0.06);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #4d44e3 0%, #4034d7 100%);
        }
    </style>
</head>
<body className="bg-surface font-body text-on-surface antialiased">
<header className="fixed top-0 left-0 right-0 z-50 bg-[#f7f9fb] dark:bg-slate-950 font-['Manrope'] antialiased">
<div className="flex justify-between items-center w-full px-8 py-6 max-w-7xl mx-auto">
<div className="text-2xl font-bold tracking-tight text-[#2a3439] dark:text-slate-100">TaskFlow</div>
<div className="flex items-center gap-4">
<span className="material-symbols-outlined text-[#2a3439]/60 dark:text-slate-400 cursor-pointer active:scale-95 transition-transform" data-icon="help_outline">help_outline</span>
</div>
</div>
</header>
<main className="min-h-screen flex flex-col items-center justify-center pt-24 pb-12 px-6">
<div className="w-full max-w-[480px]">
<div className="mb-10 text-center">
<h1 className="font-headline text-[2.75rem] font-bold text-on-surface leading-tight tracking-tight mb-2">Begin your flow.</h1>
<p className="text-on-surface-variant font-body">Focus on what matters, leave the clutter behind.</p>
</div>
<div className="bg-surface-container-lowest rounded-xl ghost-shadow p-8 md:p-10">
<div className="flex p-1 bg-surface-container rounded-lg mb-8">
<button className="flex-1 py-2 text-sm font-medium text-on-surface-variant rounded-md hover:text-on-surface transition-colors duration-200">Login</button>
<button className="flex-1 py-2 text-sm font-semibold text-on-primary-container bg-surface-container-lowest rounded-md shadow-sm">Signup</button>
</div>
<form className="space-y-6">
<div className="space-y-2">
<label className="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="full_name">Full Name (Optional)</label>
<input className="w-full px-4 py-3 bg-surface-container-highest/30 border-none rounded-lg focus:ring-2 focus:ring-primary-container/50 focus:bg-primary-container/20 transition-all duration-200 placeholder:text-outline-variant text-on-surface" id="full_name" placeholder="Alex Rivers" type="text"/>
</div>
<div className="space-y-2">
<label className="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<input className="w-full px-4 py-3 bg-surface-container-highest/30 border-none rounded-lg focus:ring-2 focus:ring-primary-container/50 focus:bg-primary-container/20 transition-all duration-200 placeholder:text-outline-variant text-on-surface" id="email" placeholder="alex@taskflow.io" type="email"/>
</div>
<div className="grid grid-cols-1 md:grid-cols-2 gap-4">
<div className="space-y-2">
<label className="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<input className="w-full px-4 py-3 bg-surface-container-highest/30 border-none rounded-lg focus:ring-2 focus:ring-primary-container/50 focus:bg-primary-container/20 transition-all duration-200 placeholder:text-outline-variant text-on-surface" id="password" placeholder="••••••••" type="password"/>
</div>
<div className="space-y-2">
<label className="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="confirm_password">Confirm Password</label>
<input className="w-full px-4 py-3 bg-surface-container-highest/30 border-none rounded-lg focus:ring-2 focus:ring-primary-container/50 focus:bg-primary-container/20 transition-all duration-200 placeholder:text-outline-variant text-on-surface" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<div className="pt-4">
<button className="w-full primary-gradient text-on-primary font-semibold py-4 rounded-full ghost-shadow active:scale-95 transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Create Account</span>
<span className="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div className="mt-8 pt-8 border-t border-surface-container text-center">
<p className="text-sm text-on-surface-variant">
                        Already have an account? 
                        <a className="text-primary font-semibold hover:underline underline-offset-4 transition-all" href="#">Log in here</a>
</p>
</div>
</div>
</div>
</main>
<footer className="w-full py-12 bg-[#f7f9fb] dark:bg-slate-950 font-['Inter'] text-sm tracking-wide">
<div className="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto space-y-4 md:space-y-0">
<div className="text-lg font-bold text-[#2a3439]">TaskFlow</div>
<div className="flex gap-8">
<a className="text-[#2a3439]/40 dark:text-slate-500 hover:text-[#4d44e3] dark:hover:text-indigo-300 transition-all duration-200" href="#">Privacy</a>
<a className="text-[#2a3439]/40 dark:text-slate-500 hover:text-[#4d44e3] dark:hover:text-indigo-300 transition-all duration-200" href="#">Terms</a>
<a className="text-[#2a3439]/40 dark:text-slate-500 hover:text-[#4d44e3] dark:hover:text-indigo-300 transition-all duration-200" href="#">Support</a>
</div>
<div className="text-[#2a3439]/40 dark:text-slate-500">© 2024 TaskFlow. Designed for Intentional Calm.</div>
</div>
</footer>
</body></html>
